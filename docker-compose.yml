services:
  app:
    build: .
    image: food-ordering:latest
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATA_DIR: /app/data
      GIN_MODE: release
      # AI（可选，勿把真实 key 写进 compose 文件，用 .env 注入）
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      PRINTER_DRIVER: ${PRINTER_DRIVER:-stub}
      SHOP_NAME: ${SHOP_NAME:-小馆点餐}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL:-}
      PUSHPLUS_TOKEN: ${PUSHPLUS_TOKEN:-}
    volumes:
      - food-data:/app/data
    restart: unless-stopped

volumes:
  food-data:
